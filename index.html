<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT + FB + IG downloader</title>

<style>
body{
    font-family:Arial, sans-serif;
    margin:20px;
}

textarea{
    width:100%;
    height:100px;
    margin-bottom:10px;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
    margin-right:10px;
    margin-top:5px;
}

#output{
    width:100%;
    height:200px;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>YT + FB + IG yt-dlp generator</h1>

<label for="url-input">
Paste YouTube / Facebook / Instagram URLs:
</label>

<textarea id="url-input"
placeholder="https://www.youtube.com/watch?v=example
https://fb.watch/example
https://www.instagram.com/reels/example"></textarea>

<br>

<button id="generate-140-button">best audio</button>
<button id="generate-18-button">360p Only</button>
<button id="generate-720p-button">best 720p + best audio</button>
<button id="generate-1080p-button">best 1080p + desc + best audio</button>

<!-- ÚJ GOMB -->
<button id="generate-social-button">FB / IG download</button>

<button id="append-subs-button">Add HU subtitles</button>
<button id="append-360p-button">Add 360p to Existing Output</button>
<button id="new-line-button">Add New Line</button>

<textarea id="output" readonly
placeholder="Generated commands will appear here..."></textarea>

<button id="copy-button">Copy to Clipboard</button>

<script>

// 🔥 BŐVÍTETT URL FELISMERÉS
function extractUrlsFromInput(){
    const input=document.getElementById('url-input').value;

    return input.split(/\s+/).filter(url =>
        url.match(/^https:\/\/(www\.)?youtube\.com\/watch\?v=/) ||
        url.match(/^https:\/\/youtu\.be\//) ||
        url.match(/^https:\/\/(www\.)?youtube\.com\/live\//) ||

        // FACEBOOK
        url.match(/^https:\/\/(www\.)?facebook\.com\//) ||
        url.match(/^https:\/\/fb\.watch\//) ||

        // INSTAGRAM
        url.match(/^https:\/\/(www\.)?instagram\.com\/reels\//) ||
        url.match(/^https:\/\/(www\.)?instagram\.com\/p\//) ||
        url.match(/^https:\/\/(www\.)?instagram\.com\/tv\//)
    );
}

function extractUrlsFromOutput(){
    const output=document.getElementById('output').value;

    return Array.from(output.matchAll(/https:\/\/[^\s]+/g))
        .map(m=>m[0]);
}

function generateCommands(mode="default"){

    const urls=extractUrlsFromInput();
    const output=document.getElementById('output');

    let commands='';

    urls.forEach(url=>{

        if(mode==="best720p"){

            commands+=`yt-dlp -f bestvideo[height=720][ext=mp4] -o "~/Downloads/%(title)s.%(ext)s" ${url}\n`;
            commands+=`yt-dlp -f bestaudio[ext=m4a] -o "~/Downloads/%(title)s.%(ext)s" ${url}\n\n`;

        }

        else if(mode==="140"){

            commands+=`yt-dlp -f bestaudio[ext=m4a] -o "~/Downloads/%(title)s.%(ext)s" ${url}\n\n`;

        }

        else if(mode==="360p"){

            commands+=`yt-dlp -f best[height=360] -o "~/Downloads/%(title)s.%(ext)s" ${url}\n\n`;

        }

        else if(mode==="best1080p"){

            commands+=`yt-dlp -f bestvideo[height=1080] -o "~/Downloads/%(title)s.%(ext)s" --write-description ${url}\n`;
            commands+=`yt-dlp -f bestaudio[ext=m4a] -o "~/Downloads/%(title)s.%(ext)s" ${url}\n\n`;

        }

        // 🔥 ÚJ: FACEBOOK + INSTAGRAM
        else if(mode==="social"){

    commands+=`yt-dlp -f best -o "~/Downloads/%(uploader)s - %(title|description|id)s.%(ext)s" ${url}\n\n`;

}

    });

    output.value=commands.trim()+'\n';
}

// BUTTON EVENTS
document.getElementById('generate-720p-button')
.addEventListener('click',()=>generateCommands("best720p"));

document.getElementById('generate-140-button')
.addEventListener('click',()=>generateCommands("140"));

document.getElementById('generate-18-button')
.addEventListener('click',()=>generateCommands("360p"));

document.getElementById('generate-1080p-button')
.addEventListener('click',()=>generateCommands("best1080p"));

// 🔥 ÚJ GOMB ESEMÉNY
document.getElementById('generate-social-button')
.addEventListener('click',()=>generateCommands("social"));

document.getElementById('append-subs-button').addEventListener('click',()=>{

    const output=document.getElementById('output');
    const urls=extractUrlsFromInput();

    if(urls.length===0){
        alert("No URLs found in the input!");
        return;
    }

    let extra="\n# Added HU subtitles:\n\n";

    urls.forEach(url=>{
        extra+=`yt-dlp --write-auto-subs --sub-lang hu --convert-subs srt --skip-download -o "~/Downloads/%(title)s.%(ext)s" ${url}\n`;
    });

    output.value+=extra+"\n";
});

document.getElementById('append-360p-button').addEventListener('click',()=>{

    const output=document.getElementById('output');
    const existingText=output.value;
    const urls=extractUrlsFromOutput();

    if(urls.length===0){
        alert("No URLs found in the existing output!");
        return;
    }

    let extra="\n# Added 360p downloads:\n\n";

    urls.forEach(url=>{
        extra+=`yt-dlp -f best[height=360] -o "~/Downloads/360p_%(title)s.%(ext)s" ${url}\n`;
    });

    output.value=existingText+extra+"\n";
});

document.getElementById('copy-button').addEventListener('click',()=>{

    const output=document.getElementById('output');

    output.select();
    document.execCommand('copy');

    window.location.reload();
});

document.getElementById('new-line-button').addEventListener('click',()=>{

    const inputField=document.getElementById('url-input');

    inputField.value+='\n';
    inputField.focus();
});

document.getElementById('url-input').addEventListener('mousedown',(event)=>{

    event.preventDefault();

    const inputField=event.target;
    const length=inputField.value.length;

    inputField.focus();
    inputField.setSelectionRange(length,length);
});

</script>

</body>
</html>
